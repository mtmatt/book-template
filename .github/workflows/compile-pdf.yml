name: Compile PDF

on:
  push:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Cache Typst packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/typst
          key: typst-packages-${{ hashFiles('**/*.typ') }}
          restore-keys: typst-packages-

      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-libertinus fonts-arphic-bkai00mp

          # Install SauceCodePro Nerd Font (provides SauceCodePro NFM)
          mkdir -p ~/.local/share/fonts/SauceCodePro
          curl -fsSL "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/SourceCodePro.zip" \
            -o /tmp/SourceCodePro.zip
          unzip -q /tmp/SourceCodePro.zip -d ~/.local/share/fonts/SauceCodePro/
          fc-cache -f

      - name: Compile PDF
        run: typst compile main.typ main.pdf

      - name: Commit PDF to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f main.pdf
          git diff --staged --quiet && echo "No changes to PDF" && exit 0
          git commit -m "ci: update compiled main.pdf [skip ci]"
          git push
